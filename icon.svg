<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="50%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ECFDF5" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#064e3b" flood-opacity="0.25" />
    </filter>
  </defs>
  
  <!-- Rounded Base Square (PWA Icon Standard) -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Outer subtle ring -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.15" />
  
  <!-- Elegant minimalist leaf -->
  <g transform="translate(106, 106)" filter="url(#glow)">
    <!-- Main leaf shape: left side (translucent emerald mint) -->
    <path d="M150 30 C150 30 50 130 50 210 C50 270 100 290 150 290 L150 30 Z" fill="url(#leafGrad)" opacity="0.95" />
    
    <!-- Main leaf shape: right side (solid pure white) -->
    <path d="M150 30 C150 30 250 130 250 210 C250 270 200 290 150 290 L150 30 Z" fill="#FFFFFF" />
    
    <!-- Center stem -->
    <path d="M150 30 L150 310" stroke="#047857" stroke-width="8" stroke-linecap="round" />
    
    <!-- Minimal leaf veins (right side) -->
    <path d="M150 110 Q200 120 220 100" stroke="#10B981" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.35" />
    <path d="M150 170 Q210 185 230 160" stroke="#10B981" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.35" />
    <path d="M150 230 Q200 250 220 220" stroke="#10B981" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.35" />

    <!-- Minimal leaf veins (left side) -->
    <path d="M150 110 Q100 120 80 100" stroke="#34D399" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.45" />
    <path d="M150 170 Q90 185 70 160" stroke="#34D399" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.45" />
    <path d="M150 230 Q100 250 80 220" stroke="#34D399" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.45" />
  </g>
</svg>
